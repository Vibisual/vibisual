appId: com.vibisual.app
productName: Vibisual
copyright: Copyright © 2026 Vibisual

directories:
  output: dist
  buildResources: resources

# electron-vite emits the bundled main/preload/renderer into out/.
files:
  - out/**
  - package.json
# electron-builder's default file walk + pnpm symlinks don't reliably copy the
# server's dist + node_modules into the package (.gitignore excludes dist; pnpm
# symlinks confuse the walker). Instead an afterPack hook copies real files
# (symlinks dereferenced) into the packaged tree after electron-builder finishes
# its standard work.
afterPack: ./build/after-pack.cjs

# Disable asar packaging entirely. The pnpm symlink layout doesn't play well
# with electron-builder's asarUnpack matching — better_sqlite3.node ended up
# inside the asar (dlopen unfriendly) and sqlite-vec's platform DLL was
# missing. With asar:false everything ships as plain files and the child Node
# process can dlopen natives directly. Trade-off: marginally larger install
# footprint, easier-to-inspect app code. Acceptable for current scope.
asar: false

# Skip electron-builder's default native rebuild (we control it explicitly via
# @electron/rebuild — npmRebuild would try to use node-gyp against the system
# Node version, which is exactly the ABI mismatch we're avoiding).
npmRebuild: false
nodeGypRebuild: false
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch: [x64]
  icon: resources/icons/icon.ico
  # signAndEditExecutable=false disables both signing AND rcedit (icon embed). We
  # turn it off because enabling it triggers a winCodeSign cache download whose 7z
  # contains macOS symlinks — those fail to extract on Windows without Developer
  # Mode / admin. Instead, after-pack.cjs invokes rcedit directly to embed the
  # brand bubble icon into Vibisual.exe, bypassing the cache download entirely.
  signAndEditExecutable: false
  # Code signing slot — certificate wiring is deferred (SCENARIO.md §3.7 / task §7).
  # certificateFile / certificatePassword left unset on purpose.

nsis:
  # §4 v2.44 — 자동 업데이트가 무인(조용히)으로 돌려면 oneClick 인스톨러가 필요하다.
  # oneClick:false(조립형 마법사)는 자동 업데이트의 "기존 파일 제거" 단계에서
  # "Failed to uninstall old application files (2)" 류 에러 + 마법사 노출이 잦다.
  # oneClick:true + perMachine:false = per-user 무인 설치/업데이트(관리자 권한 불필요).
  oneClick: true
  perMachine: false
  # allowToChangeInstallationDirectory 는 oneClick:false 에서만 유효 — 제거.
  artifactName: ${productName}-${version}-setup.${ext}
  # Brand bubble — installer wizard window, uninstaller, and Start-menu/Desktop shortcuts
  # all use the multi-size .ico so Windows renders crisp at every DPI.
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
  # icon: resources/icons/icon.icns   # Stage 8
  category: public.app-category.developer-tools

linux:
  target:
    - AppImage
  icon: resources/icons/icon.png
  category: Development

# electron-updater feed — SCENARIO.md §4 v2.44 자동 업데이트.
# 이 publish 설정이 있어야 electron-builder 가 빌드 산출물에 app-update.yml 을 베이킹하고,
# `--publish always` 빌드 시 setup + latest.yml(+blockmap)을 GitHub Releases 에 업로드한다.
# main 의 updaterManager(autoUpdater)는 이 피드를 읽어 최신 버전을 감지·다운로드한다.
# ⚠️ 소스 main 푸시 ≠ 릴리스 — 버전 bump + 릴리스 발행(.github/workflows/release.yml)이 있어야
#    업데이트가 트리거된다.
publish:
  provider: github
  owner: Vibisual
  repo: vibisual
  # electron-builder 기본값은 draft(초안) — 업데이터(autoUpdater)는 draft 릴리스를 읽지 못한다.
  # release 로 두어야 태그 푸시 시 정식 발행되어 설치된 앱이 latest.yml 을 감지한다.
  releaseType: release
